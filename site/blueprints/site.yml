title: Porta Vecia
tabs:
  content:
    label: Contenuto
    fields:
      phone:
        label: Telefono
        type: tel
        translate: false
      whatsapp:
        label: WhatsApp
        type: tel
        translate: false
      email:
        label: Email
        type: email
        translate: false
      address:
        label: Indirizzo
        type: textarea
        translate: false
      street_address:
        label: Via (per Google)
        type: text
        translate: false
        help: "Es: Via Matteotti 30"
      city:
        label: Citta
        type: text
        translate: false
        default: Este
      postal_code:
        label: CAP
        type: text
        translate: false
        default: "35042"
      latitude:
        label: Latitudine
        type: text
        translate: false
        help: "Es: 45.2269"
      longitude:
        label: Longitudine
        type: text
        translate: false
        help: "Es: 11.6569"
      ga4MeasurementId:
        label: GA4 Measurement ID
        type: text
        translate: false
        help: "Es: G-XXXXXXXXXX"
  hours:
    label: Orari
    fields:
      hours:
        label: Orari di apertura
        type: structure
        fields:
          day:
            label: Giorno
            type: text
            width: 1/2
          time:
            label: Orario
            type: text
            width: 1/2
  social:
    label: Social
    fields:
      social:
        label: Social Media
        type: structure
        fields:
          platform:
            label: Piattaforma
            type: select
            options:
              instagram: Instagram
              facebook: Facebook
              tripadvisor: TripAdvisor
            width: 1/2
          url:
            label: URL
            type: url
            width: 1/2
  seo:
    label: SEO
    fields:
      description:
        label: Meta Description
        type: textarea
        size: small
        help: "Default meta description for all pages. Max 160 chars."
        counter: true
        maxlength: 170
      thumbnail:
        label: Default Social Image
        type: files
        query: site.images
        multiple: false
        help: "Default Open Graph image. Recommended 1200x630px."
