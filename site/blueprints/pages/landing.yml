title: Landing Page SEO
num: "{{ page.num }}"
options:
  changeSlug: true
  changeStatus: true
  changeTemplate: false
  delete: true
tabs:
  content:
    label: Contenuto
    fields:
      headline:
        label: Titolo H1
        type: text
        required: true
        help: "Il titolo principale della pagina, ottimizzato per SEO"
      text:
        label: Contenuto
        type: textarea
        size: large
        required: true
        help: "Testo principale della landing page (minimo 400 parole)"
      faq:
        label: FAQ
        type: structure
        fields:
          question:
            label: Domanda
            type: text
            required: true
          answer:
            label: Risposta
            type: textarea
            size: small
            required: true
  seo:
    label: SEO
    fields:
      customtitle:
        label: SEO Title
        type: text
        help: "Sovrascrive il titolo nei risultati di ricerca. Max 60 caratteri."
        counter: true
        maxlength: 70
      description:
        label: Meta Description
        type: textarea
        size: small
        help: "Mostrata nei risultati di ricerca. Max 160 caratteri."
        counter: true
        maxlength: 170
      thumbnail:
        label: Immagine Social Share
        type: files
        query: page.images
        multiple: false
        help: "Immagine per Facebook/Twitter. 1200x630px consigliato."
