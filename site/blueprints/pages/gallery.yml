title: Galleria
tabs:
  content:
    label: Contenuto
    fields:
      headline:
        label: Titolo pagina
        type: text
        required: true
      intro:
        label: Introduzione
        type: textarea
        size: small
  photos:
    label: Foto
    sections:
      gallery_photos:
        label: Foto galleria
        type: files
        layout: cards
        template: gallery-image
        sortable: true
        image:
          cover: true
          ratio: 3/2
        info: "{{ file.category }}"
  seo:
    label: SEO
    fields:
      customtitle:
        label: SEO Title
        type: text
        help: "Overrides page title in search results. Max 60 chars."
        counter: true
        maxlength: 70
      description:
        label: Meta Description
        type: textarea
        size: small
        help: "Shown in search results. Max 160 chars."
        counter: true
        maxlength: 170
      thumbnail:
        label: Social Share Image
        type: files
        query: page.images
        multiple: false
        help: "Image for Facebook/Twitter sharing. 1200x630px recommended."
